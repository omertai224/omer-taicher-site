<style>

  color: var(--text-mid);
  padding: 7px 16px;

  transition: all 0.2s;
}

<body>

<!-- TOKEN GATE -->
<div id="token-gate">
  <div style="font-size:1.3rem;font-weight:800;color:#fff;font-family:'Rubik',sans-serif;">עומר <span style="color:var(--orange)">טייכר</span> — פאנל ניהול</div>
  <div class="token-box">
    <h2>כניסה לפאנל</h2>
    <p>הכנס פרטי התחברות</p>
    <input type="text" name="username" autocomplete="username" value="admin" style="display:none;">
    <label style="font-size:0.78rem;font-weight:700;color:#a8c5d6;margin-bottom:4px;display:block;">סיסמה</label>
    <input class="token-input" id="token-input" type="password" placeholder="סיסמה" autocomplete="current-password" onkeydown="if(event.key==='Enter')saveToken()">
    <button class="token-btn" onclick="saveToken()">כניסה</button>
  </div>

</div>

<!-- MAIN -->
<div id="main-content">

  <!-- HEADER — קבוע, לא זז -->
  <div class="header">
    <div class="header-logo"><a href="/" style="color:inherit;text-decoration:none">עומר <span>טייכר</span></a> <span style="font-weight:400;font-size:0.78rem;color:var(--text-light);margin-right:6px">· פאנל ניהול</span></div>
    <div class="header-center">
      <div class="repo-pills">
        <button class="repo-pill active" id="repo-btn-tutorials" onclick="selectRepo('omer-taicher-interactive', this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> אינטראקטיבי</button>
        <button class="repo-pill" id="repo-btn-blog" onclick="selectRepo('omer-taicher-blog', this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg> בלוג</button>
      </div>
    </div>
    <div class="header-right" style="display:flex;justify-content:flex-end;gap:10px;align-items:center;flex-wrap:wrap;">
      <button onclick="switchTab('contacts', this)" id="tab-btn-contacts" title="אנשי קשר" style="display:inline-flex;align-items:center;gap:7px;background:#2d6a4f;color:#fff;border:none;padding:8px 18px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;" onmouseenter="this.style.background='#1b4332'" onmouseleave="this.style.background='#2d6a4f'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        אנשי קשר
      </button>
      <button onclick="switchTab('gallery', this)" id="tab-btn-gallery" title="גלריית מדיה" style="display:inline-flex;align-items:center;gap:7px;background:#2b6cb0;color:#fff;border:none;padding:8px 18px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;" onmouseenter="this.style.background='#2c5282'" onmouseleave="this.style.background='#2b6cb0'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        גלריה
      </button>
      <button onclick="switchTab('workflow', this)" id="tab-btn-workflow" title="תהליך עבודה" style="display:inline-flex;align-items:center;gap:7px;background:#7c3aed;color:#fff;border:none;padding:8px 18px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;" onmouseenter="this.style.background='#6d28d9'" onmouseleave="this.style.background='#7c3aed'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        תהליך עבודה
      </button>
      <a href="/editor/" target="_blank" style="display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#e8834e,#f6a67e);color:#1a1a2e;border:none;padding:8px 18px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;text-decoration:none;" onmouseenter="this.style.opacity='0.85'" onmouseleave="this.style.opacity='1'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        עורך הדרכות
      </a>
    </div>
  </div>

  <!-- ENVIRONMENT INDICATOR -->
  <div id="env-bar"></div>

  <!-- GLOBAL PUSH BAR -->
  <div id="global-push-bar" style="display:none;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:#fff8e1;border-bottom:2px solid #f9a825;font-family:inherit;font-size:0.82rem;font-weight:600;color:#6d4c00;direction:rtl;">
    <span style="font-size:1.1rem">⚠</span>
    <span id="global-push-label">שינויים ממתינים לדחיפה</span>
    <button id="global-push-btn" onclick="globalPushAll()" style="background:#27ae60;color:#fff;border:none;padding:6px 18px;border-radius:50px;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:inherit;animation:pulse 2s infinite">דחוף הכל ל-GitHub</button>
    <button onclick="showConfirm('לבטל את כל השינויים הממתינים?',()=>{clearAllPending();blogDiscardLocal?.();},{yes:'כן, בטל',color:'#c0392b'})" style="background:#fde8e8;color:#c0392b;border:none;padding:6px 14px;border-radius:50px;font-size:0.78rem;font-weight:600;cursor:pointer;font-family:inherit">בטל הכל</button>
  </div>

  <!-- TAB: CONTENT -->
  <div class="tab-panel active" id="tab-content">
    <!-- STATUS BAR -->
    <div class="status-bar" id="content-status-bar">
      <div class="status-dot" id="status-dot-content"></div>
      <div class="status-text" id="status-text-content">מוכן</div>
    </div>
    <!-- תוכן בלוג — ניהול פוסטים -->
    <div id="blog-manager" style="display:none"></div>

    <!-- ניהול מוצרים — הדרכות אינטראקטיביות -->
    <div id="tutorials-content" style="display:none">
      <div id="ic-panel-products">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px">
          <div style="font-size:0.82rem;color:var(--text-light)" id="interactive-count">טוען...</div>
          <button onclick="interactiveNewItem()" style="background:var(--orange-deep);color:#fff;border:none;padding:9px 20px;border-radius:50px;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:inherit">+ הדרכה חדשה</button>
        </div>
        <div id="interactive-list"></div>
      </div>
    </div>

  </div>

<!-- TAB: CONTACTS -->
  <div class="tab-panel" id="tab-contacts">

    <!-- STATS BAR -->
    <div id="contacts-stats-bar" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;"></div>

    <!-- INSIGHTS -->
    <div id="contacts-insights" style="margin-bottom:20px;display:none;">
      <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:2px solid #c3d9e8;">
        <div style="display:flex;gap:0;min-width:max-content;">
          <button onclick="switchInsightTab(0)" id="itab-0" style="padding:9px 20px;font-family:inherit;font-size:0.8rem;font-weight:700;border:none;border-bottom:3px solid #1a4a6b;background:transparent;color:#1a4a6b;cursor:pointer;margin-bottom:-2px;white-space:nowrap;">סגמנטים</button>
          <button onclick="switchInsightTab(1)" id="itab-1" style="padding:9px 20px;font-family:inherit;font-size:0.8rem;font-weight:700;border:none;border-bottom:3px solid transparent;background:transparent;color:#aaa;cursor:pointer;margin-bottom:-2px;white-space:nowrap;">DNA של הקהל</button>
          <button onclick="switchInsightTab(2)" id="itab-2" style="padding:9px 20px;font-family:inherit;font-size:0.8rem;font-weight:700;border:none;border-bottom:3px solid transparent;background:transparent;color:#aaa;cursor:pointer;margin-bottom:-2px;white-space:nowrap;">המלצות מכירה</button>
          <button onclick="switchInsightTab(3)" id="itab-3" style="padding:9px 20px;font-family:inherit;font-size:0.8rem;font-weight:700;border:none;border-bottom:3px solid transparent;background:transparent;color:#aaa;cursor:pointer;margin-bottom:-2px;white-space:nowrap;">נתונים כלליים</button>
        </div>
      </div>
      <div id="contacts-insights-text" style="background:#fff;border:1px solid #c3d9e8;border-top:none;border-radius:0 0 12px 12px;padding:18px 20px;"></div>
    </div>

    <!-- TOOLBAR -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
        <input type="text" id="contacts-search" placeholder="חיפוש לפי שם / אימייל / טלפון..." oninput="filterContacts()" style="padding:8px 16px;border-radius:50px;border:1.5px solid var(--border);font-family:inherit;font-size:0.85rem;outline:none;width:260px;">
        <select id="contacts-filter-loyalty" onchange="filterContacts()" style="padding:8px 14px;border-radius:50px;border:1.5px solid var(--border);font-family:inherit;font-size:0.83rem;outline:none;color:var(--navy);font-weight:600;">
          <option value="all">כולם</option>
          <option value="10">נאמנים 10+</option>
          <option value="3">חוזרים 3+</option>
          <option value="1">רישום יחיד</option>
          <option value="notes">עם הערות</option>
        </select>
      </div>
      <div id="contacts-action-btns" style="display:flex;gap:8px;flex-wrap:wrap;">
        <span id="contacts-count" style="font-size:0.82rem;font-weight:600;color:var(--text-light);align-self:center;"></span>
        <input type="file" id="lecture-csv-input" accept=".csv" style="display:none" onchange="importLecture(this)">
        <button onclick="document.getElementById('lecture-csv-input').click()" style="background:#1a4a6b;color:#fff;border:none;padding:8px 18px;border-radius:50px;font-family:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          ייבוא הרצאה
        </button>
        <button onclick="importNotes()" style="background:#eef4f8;color:#1a4a6b;border:1.5px solid #c3d9e8;padding:8px 16px;border-radius:50px;font-family:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
          ייבוא הערות
        </button>
        <button onclick="exportContacts()" style="background:var(--cream);color:var(--navy);border:1.5px solid var(--border);padding:8px 16px;border-radius:50px;font-family:inherit;font-size:0.82rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          ייצוא CSV
        </button>
      </div>
    </div>

    <!-- TABLE -->
    <div style="overflow-x:auto;border-radius:12px;border:1px solid var(--border);">
      <table style="width:100%;border-collapse:collapse;font-size:0.84rem;">
        <thead>
          <tr style="background:var(--navy);color:#fff;">
            <th style="padding:11px 14px;text-align:right;font-weight:700;white-space:nowrap;width:80px;">שם פרטי</th>
            <th style="padding:11px 14px;text-align:right;font-weight:700;white-space:nowrap;width:80px;">שם משפחה</th>
            <th style="padding:11px 14px;text-align:right;font-weight:700;">אימייל</th>
            <th style="padding:11px 14px;text-align:right;font-weight:700;white-space:nowrap;min-width:130px;">טלפון</th>
            <th id="th-count" onclick="toggleCountSort()" style="padding:11px 14px;text-align:center;font-weight:700;white-space:nowrap;cursor:pointer;user-select:none;" title="מיין לפי רישומים">רישומים <span id="sort-arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 4 7 20"/><polyline points="3 8 7 4 11 8"/><polyline points="17 20 17 4"/><polyline points="13 16 17 20 21 16"/></svg></span></th>
            <th style="padding:11px 14px;text-align:right;font-weight:700;">הערות</th>
            <th style="padding:11px 14px;text-align:center;font-weight:700;">פעולות</th>
          </tr>
        </thead>
        <tbody id="contacts-tbody"></tbody>
      </table>
    </div>
    <div id="contacts-pagination" style="display:none;align-items:center;justify-content:center;gap:6px;padding:16px 0;flex-wrap:wrap;"></div>
    <div id="contacts-empty" style="display:none;text-align:center;padding:48px;color:var(--text-light);">
      <div style="opacity:0.3;margin-bottom:8px;">אין תוצאות</div>
    </div>
  </div>

  <!-- TAB: GALLERY -->
  <div class="tab-panel" id="tab-gallery">
    <div class="status-bar">
      <div style="font-size:0.95rem;font-weight:800;color:var(--navy)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> גלריית מדיה</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="status-dot" id="status-dot-gallery"></div>
        <div class="status-text" id="status-text-gallery">טוען...</div>
      </div>
    </div>

    <!-- שורת העלאה + קטגוריה -->
    <div style="margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <button onclick="triggerGalleryUpload()" id="gallery-upload-btn" style="background:var(--navy);color:#fff;border:none;padding:11px 24px;border-radius:50px;font-family:inherit;font-weight:700;font-size:0.88rem;cursor:pointer;display:flex;align-items:center;gap:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        העלאת קובץ
      </button>
      <select id="gallery-category-select" style="padding:10px 16px;border-radius:50px;border:1.5px solid var(--border);font-family:inherit;font-size:0.85rem;font-weight:600;color:var(--navy);background:#fff;cursor:pointer;outline:none;">
        <option value="בלוג">✍️ בלוג</option>
        <option value="כללי">📁 כללי</option>
      </select>
      <input type="file" id="gallery-file-input" accept="image/*,video/*" multiple style="display:none" onchange="uploadGalleryFiles(this)">
      <div style="font-size:0.78rem;color:var(--text-light)">תמונות וסרטונים — נשמרים ב-Cloudinary</div>
    </div>

    <!-- פילטר קטגוריות -->
    <div id="gallery-filter-bar" style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center;">
      <button onclick="filterGallery('הכל')" class="gallery-filter-btn gallery-filter-active" data-cat="הכל">הכל</button>
      <button onclick="filterGallery('בלוג')" class="gallery-filter-btn" data-cat="בלוג">✍️ בלוג</button>
      <button onclick="filterGallery('כללי')" class="gallery-filter-btn" data-cat="כללי">📁 כללי</button>
      <button id="gallery-select-all" onclick="toggleSelectAll()" style="display:inline-flex;align-items:center;gap:6px;background:#fff;color:var(--navy);border:1.5px solid var(--border);padding:7px 16px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;margin-right:auto;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
        <span id="gallery-select-all-label">סמן הכל</span>
      </button>
      <button id="gallery-multi-download" onclick="downloadSelectedGalleryItems()" style="display:none;align-items:center;gap:6px;background:var(--navy);color:#fff;border:none;padding:7px 16px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        הורד נבחרים
      </button>
      <div id="gallery-multi-move" style="display:none;align-items:center;gap:6px;">
        <select id="gallery-move-select" style="padding:7px 14px;border-radius:50px;border:1.5px solid var(--border);font-family:inherit;font-size:0.8rem;font-weight:600;color:var(--navy);background:#fff;cursor:pointer;outline:none;">
          <option value="">העבר ל...</option>
          <option value="בלוג">בלוג</option>
          <option value="כללי">כללי</option>
        </select>
        <button onclick="moveSelectedToCategory()" style="background:var(--orange-deep);color:#fff;border:none;padding:7px 16px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;">העבר</button>
      </div>
      <button id="gallery-multi-delete" onclick="deleteSelectedGalleryItems()" style="display:none;align-items:center;gap:6px;background:#dc2626;color:#fff;border:none;padding:7px 16px;border-radius:50px;font-family:inherit;font-size:0.8rem;font-weight:700;cursor:pointer;">🗑️ מחק נבחרים</button>
    </div>

    <!-- רשת תמונות -->
    <div id="gallery-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;"></div>
    <div id="gallery-empty" style="display:none;text-align:center;padding:60px 20px;color:var(--text-light);font-size:0.88rem;">
      אין קבצים עדיין — בחר קטגוריה והעלה
    </div>

  </div>

  <!-- TAB: WORKFLOW -->
  <div class="tab-panel" id="tab-workflow" style="padding:0;margin:0;overflow:hidden;">
    <iframe src="/pages/workflow/" style="width:100%;height:calc(100vh - 60px);border:none;display:block;"></iframe>
  </div>

</div>

<script src="admin-core.js"></script>
<script src="admin-content.js"></script>
<script src="admin-code.js"></script>

<script>checkToken();</script>

<!-- MODAL -->
<div id="app-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:1000;align-items:center;justify-content:center;animation:modalFadeIn .2s ease;">
  <div style="background:#fff;border-radius:18px;padding:36px 40px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.18);max-width:370px;width:90%;animation:modalSlideIn .25s ease;">
    <div id="app-modal-icon" style="font-size:1.6rem;margin-bottom:14px;"></div>
    <div id="app-modal-text" style="font-size:1rem;font-weight:700;color:#1a4a6b;margin-bottom:8px;white-space:pre-line;"></div>
    <div id="app-modal-sub" style="font-size:0.84rem;color:#666;margin-bottom:26px;"></div>
    <div id="app-modal-buttons" style="display:flex;gap:12px;justify-content:center;"></div>
  </div>
</div>
<style>
@keyframes modalFadeIn { from { opacity:0 } to { opacity:1 } }
@keyframes modalSlideIn { from { transform:scale(0.92) translateY(12px);opacity:0 } to { transform:scale(1) translateY(0);opacity:1 } }
</style>
</body>
