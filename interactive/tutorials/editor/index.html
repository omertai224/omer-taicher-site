<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עורך בועות</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <!-- Right: Save button -->
  <button class="tb-icon save-btn" id="btnSave">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    שמור
  </button>
  <div class="topbar-spacer"></div>
  <!-- Center: Controls -->
  <button class="tb-icon" id="btnZoomFit" title="התאם גודל">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
  </button>
  <button class="tb-icon" id="btnZoomOut" title="הקטן">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <button class="tb-icon" id="btnZoomIn" title="הגדל">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <div class="topbar-sep"></div>
  <button class="tb-icon" id="btnPrev" title="שקף קודם">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="slide-info" id="slideInfo">---</span>
  <button class="tb-icon" id="btnNext" title="שקף הבא">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="topbar-sep"></div>
  <select id="tutorialSelect"><option value="">בחרו הדרכה...</option></select>
  <button id="btnLoadLocal" class="tb-icon" title="טען תיקייה מהמחשב">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
    טען
  </button>
  <div class="topbar-spacer"></div>
</div>

<!-- Main -->
<div class="main">
  <div class="canvas-area" id="canvasArea">
    <div class="no-slide" id="noSlide">בחרו הדרכה מהתפריט למעלה<br><small>או לחצו "טען" לפתיחת תיקייה מהמחשב</small></div>
    <div class="canvas-inner" id="canvasInner">
    <div class="slide-container" id="slideContainer" style="display:none;">
      <img class="slide-img" id="slideImg">
      <div class="editor-box" id="editorBox" style="display:none;">
        <div class="resize-handle tl" data-handle="tl"></div>
        <div class="resize-handle tr" data-handle="tr"></div>
        <div class="resize-handle bl" data-handle="bl"></div>
        <div class="resize-handle br" data-handle="br"></div>
      </div>
      <div class="editor-bubble" id="editorBubble" style="display:none;">
        <div class="drag-label">&#x2725; גררו למיקום</div>
        <div id="bubblePreview"></div>
      </div>
    </div>
    </div>
  </div>
  <div class="panel" id="panel"></div>
</div>

<!-- Slide Strip -->
<div class="strip" id="slideStrip"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="app.js"></script>
<script src="loader.js"></script>
<script src="nav.js"></script>
<script src="render.js"></script>
<script src="drag-box.js"></script>
<script src="drag-bubble.js"></script>
<script src="panel.js"></script>
<script src="export.js"></script>
</body>
</html>
