<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <style>
    @keyframes scroll-pulse {
      0%, 100% { fill: #5b8fa8; transform: translateY(0); }
      50% { fill: #f6a67e; transform: translateY(4px); }
    }
    @keyframes arrow-bounce {
      0%, 100% { opacity: 0.4; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(6px); }
    }
    .mouse-body { fill: #1a2540; stroke: #5b8fa8; stroke-width: 2; }
    .mouse-btn { fill: #1a2540; stroke: #5b8fa8; stroke-width: 1.5; }
    .mouse-divider { stroke: #5b8fa8; stroke-width: 1; }
    .mouse-wheel { animation: scroll-pulse 1.5s ease-in-out infinite; }
    .scroll-arrow { animation: arrow-bounce 1.5s ease-in-out infinite; fill: #f6a67e; }
  </style>
  <rect class="mouse-body" x="10" y="5" width="60" height="75" rx="30"/>
  <path class="mouse-btn" d="M10,35 L10,20 Q10,5 40,5 L40,35 Z"/>
  <path class="mouse-btn" d="M40,35 L40,5 Q70,5 70,20 L70,35 Z"/>
  <line class="mouse-divider" x1="40" y1="5" x2="40" y2="35"/>
  <rect class="mouse-wheel" x="36" y="15" width="8" height="14" rx="4"/>
  <polygon class="scroll-arrow" points="40,93 30,83 35,83 35,73 45,73 45,83 50,83"/>
  <rect rx="10" x="5" y="98" width="70" height="20" fill="#1a2540" stroke="#5b8fa8" stroke-width="1"/>
  <text x="40" y="112" fill="#f6a67e" font-family="Rubik,sans-serif" font-size="10" font-weight="700" text-anchor="middle">גלילה למטה</text>
</svg>
