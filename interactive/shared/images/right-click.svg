<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 95" width="80" height="95">
  <style>
    @keyframes right-click-pulse {
      0%, 100% { fill: #1a2540; }
      40%, 60% { fill: #f6a67e; }
    }
    .mouse-body { fill: #1a2540; stroke: #5b8fa8; stroke-width: 2; }
    .mouse-left { fill: #1a2540; stroke: #5b8fa8; stroke-width: 1.5; }
    .mouse-right { animation: right-click-pulse 2s ease-in-out infinite; stroke: #f6a67e; stroke-width: 1.5; }
    .mouse-divider { stroke: #5b8fa8; stroke-width: 1; }
    .mouse-wheel { fill: #5b8fa8; }
  </style>
  <rect class="mouse-body" x="10" y="5" width="60" height="80" rx="30"/>
  <path class="mouse-left" d="M10,40 L10,20 Q10,5 40,5 L40,40 Z"/>
  <path class="mouse-right" d="M40,40 L40,5 Q70,5 70,20 L70,40 Z"/>
  <line class="mouse-divider" x1="40" y1="5" x2="40" y2="40"/>
  <rect class="mouse-wheel" x="36" y="15" width="8" height="14" rx="4"/>
</svg>
