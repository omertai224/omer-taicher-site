<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 130" width="80" height="130">
  <style>
    @keyframes right-click-pulse {
      0%, 100% { fill: #1a2540; }
      40%, 60% { fill: #f6a67e; }
    }
    .mouse-body { fill: #1a2540; stroke: #5b8fa8; stroke-width: 2; }
    .mouse-left { fill: #1a2540; stroke: #5b8fa8; stroke-width: 1.5; }
    .mouse-right { animation: right-click-pulse 2s ease-in-out infinite; stroke: #f6a67e; stroke-width: 1.5; }
    .mouse-divider { stroke: #5b8fa8; stroke-width: 1; }
    .mouse-wheel { fill: #5b8fa8; }
  </style>
  <rect class="mouse-body" x="10" y="15" width="60" height="75" rx="30"/>
  <path class="mouse-left" d="M10,45 L10,30 Q10,15 40,15 L40,45 Z"/>
  <path class="mouse-right" d="M40,45 L40,15 Q70,15 70,30 L70,45 Z"/>
  <line class="mouse-divider" x1="40" y1="15" x2="40" y2="45"/>
  <rect class="mouse-wheel" x="36" y="25" width="8" height="14" rx="4"/>
  <rect rx="10" x="5" y="95" width="70" height="30" fill="#1a2540" stroke="#5b8fa8" stroke-width="1"/>
  <text x="40" y="105" fill="#f6a67e" font-family="Rubik,sans-serif" font-size="9" font-weight="600" text-anchor="middle">:במחשב</text><text x="40" y="117" fill="#f6a67e" font-family="Rubik,sans-serif" font-size="10" font-weight="700" text-anchor="middle">קליק ימני</text>
</svg>
