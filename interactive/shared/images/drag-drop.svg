<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 130" width="80" height="130">
  <style>
    @keyframes drag-move {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-8px, 12px); }
    }
    .mouse-body { fill: #1a2540; stroke: #5b8fa8; stroke-width: 2; }
    .mouse-left { fill: #f6a67e; stroke: #f6a67e; stroke-width: 1.5; }
    .mouse-right { fill: #1a2540; stroke: #5b8fa8; stroke-width: 1.5; }
    .mouse-divider { stroke: #5b8fa8; stroke-width: 1; }
    .mouse-wheel { fill: #5b8fa8; }
    .drag-arrow { fill: none; stroke: #f6a67e; stroke-width: 2; stroke-dasharray: 4 3; opacity: 0.7; }
  </style>
  <path class="drag-arrow" d="M55,20 Q45,45 35,65"/>
  <polygon fill="#f6a67e" points="30,60 40,68 35,58" opacity="0.7"/>
  <g style="animation: drag-move 2s ease-in-out infinite;">
    <rect class="mouse-body" x="15" y="10" width="50" height="60" rx="25" style="animation:none;"/>
    <path class="mouse-left" d="M15,35 L15,23 Q15,10 40,10 L40,35 Z"/>
    <path class="mouse-right" d="M40,35 L40,10 Q65,10 65,23 L65,35 Z"/>
    <line class="mouse-divider" x1="40" y1="10" x2="40" y2="35"/>
    <rect class="mouse-wheel" x="36" y="19" width="8" height="12" rx="4"/>
  </g>
  <rect rx="10" x="5" y="95" width="70" height="30" fill="#1a2540" stroke="#5b8fa8" stroke-width="1"/>
  <text x="40" y="112" fill="#f6a67e" font-family="Rubik,sans-serif" font-size="11" font-weight="700" text-anchor="middle">במחשב:</text><text x="40" y="122" fill="#f6a67e" font-family="Rubik,sans-serif" font-size="11" font-weight="700" text-anchor="middle">גרירה</text>
</svg>
