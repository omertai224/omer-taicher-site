<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 95" width="80" height="95">
  <style>
    @keyframes drag-move {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-8px, 12px); }
    }
    .mouse-body { fill: #1a2540; stroke: #5b8fa8; stroke-width: 2; }
    .mouse-left { fill: #f6a67e; stroke: #f6a67e; stroke-width: 1.5; }
    .mouse-right { fill: #1a2540; stroke: #5b8fa8; stroke-width: 1.5; }
    .mouse-divider { stroke: #5b8fa8; stroke-width: 1; }
    .mouse-wheel { fill: #5b8fa8; }
    .drag-arrow { fill: none; stroke: #f6a67e; stroke-width: 2; stroke-dasharray: 4 3; opacity: 0.7; }
  </style>
  <path class="drag-arrow" d="M55,15 Q45,40 35,60"/>
  <polygon fill="#f6a67e" points="30,55 40,63 35,53" opacity="0.7"/>
  <g style="animation: drag-move 2s ease-in-out infinite;">
    <rect class="mouse-body" x="15" y="5" width="50" height="60" rx="25" style="animation:none;"/>
    <path class="mouse-left" d="M15,30 L15,18 Q15,5 40,5 L40,30 Z"/>
    <path class="mouse-right" d="M40,30 L40,5 Q65,5 65,18 L65,30 Z"/>
    <line class="mouse-divider" x1="40" y1="5" x2="40" y2="30"/>
    <rect class="mouse-wheel" x="36" y="14" width="8" height="12" rx="4"/>
  </g>
</svg>
