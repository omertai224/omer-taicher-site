<!-- Drag and drop animation SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <style>
    @keyframes drag-move {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-8px, 12px); }
    }
    @keyframes drag-press {
      0%, 100% { fill: #1a2540; }
      20%, 80% { fill: #f6a67e; }
    }
    .mouse-body { fill: #1a2540; stroke: #5b8fa8; stroke-width: 2; animation: drag-move 2s ease-in-out infinite; }
    .mouse-left { animation: drag-press 2s ease-in-out infinite; stroke: #f6a67e; stroke-width: 1.5; }
    .mouse-right { fill: #1a2540; stroke: #5b8fa8; stroke-width: 1.5; }
    .mouse-divider { stroke: #5b8fa8; stroke-width: 1; }
    .mouse-wheel { fill: #5b8fa8; }
    .drag-arrow { fill: none; stroke: #f6a67e; stroke-width: 2; stroke-dasharray: 4 3; opacity: 0.7; }
    .drag-label { fill: #f6a67e; font-family: Rubik, sans-serif; font-size: 11px; font-weight: 700; text-anchor: middle; }
  </style>
  <!-- Drag path -->
  <path class="drag-arrow" d="M55,25 Q45,50 35,70"/>
  <polygon fill="#f6a67e" points="30,65 40,73 35,63" opacity="0.7"/>
  <!-- Mouse (moves with animation) -->
  <g style="animation: drag-move 2s ease-in-out infinite;">
    <rect class="mouse-body" x="15" y="15" width="50" height="65" rx="25" style="animation:none;"/>
    <path class="mouse-left" d="M15,42 L15,28 Q15,15 40,15 L40,42 Z"/>
    <path class="mouse-right" d="M40,42 L40,15 Q65,15 65,28 L65,42 Z"/>
    <line class="mouse-divider" x1="40" y1="15" x2="40" y2="42"/>
    <rect class="mouse-wheel" x="36" y="24" width="8" height="12" rx="4"/>
  </g>
  <text class="drag-label" x="40" y="115">גרירה</text>
</svg>
