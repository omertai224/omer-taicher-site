<!-- Double-click mouse animation SVG -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="80" height="120">
  <style>
    @keyframes dbl-click {
      0%, 100% { fill: #1a2540; }
      10%, 15% { fill: #f6a67e; }
      25%, 30% { fill: #f6a67e; }
    }
    .mouse-body { fill: #1a2540; stroke: #5b8fa8; stroke-width: 2; }
    .mouse-left { animation: dbl-click 2.5s ease-in-out infinite; stroke: #f6a67e; stroke-width: 1.5; }
    .mouse-right { fill: #1a2540; stroke: #5b8fa8; stroke-width: 1.5; }
    .mouse-divider { stroke: #5b8fa8; stroke-width: 1; }
    .mouse-wheel { fill: #5b8fa8; }
    .click-label { fill: #f6a67e; font-family: Rubik, sans-serif; font-size: 10px; font-weight: 700; text-anchor: middle; }
  </style>
  <rect class="mouse-body" x="10" y="20" width="60" height="80" rx="30"/>
  <path class="mouse-right" d="M40,50 L40,20 Q70,20 70,35 L70,50 Z"/>
  <path class="mouse-left" d="M10,50 L10,35 Q10,20 40,20 L40,50 Z"/>
  <line class="mouse-divider" x1="40" y1="20" x2="40" y2="50"/>
  <rect class="mouse-wheel" x="36" y="30" width="8" height="14" rx="4"/>
  <text class="click-label" x="40" y="115">לחיצה כפולה</text>
</svg>
