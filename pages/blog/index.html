<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>בלוג | עומר טייכר</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/main.css">
<style>
  .blog-hero { background: var(--navy); color: #fff; padding: 60px 0; text-align: center; }
  .blog-hero h1 { font-size: 2rem; color: #fff; }
  .blog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; padding: 60px 0; }
  .post-card { display: block; text-decoration: none; transition: transform 0.2s; }
  .post-card:hover { transform: translateY(-4px); text-decoration: none; }
  .post-card .card { height: 100%; }
  .post-date { font-size: 0.75rem; color: var(--text-light); margin-bottom: 8px; }
  .post-title { font-size: 1.1rem; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .post-excerpt { font-size: 0.88rem; color: var(--text-mid); }
</style>
</head>
<body>

<div class="blog-hero">
  <div class="container">
    <h1>מאמרים ותובנות</h1>
    <p style="color:rgba(255,255,255,0.7); margin-top:10px;">טיפים מעשיים על AI, פרודוקטיביות וטכנולוגיה</p>
  </div>
</div>

<div class="container">
  <div class="blog-grid" id="posts-grid">
    <!-- פוסטים יוזרקו כאן דינמית בעתיד -->
    <a href="posts/post-template.html" class="post-card">
      <div class="card">
        <div class="post-date">01/03/2026</div>
        <div class="post-title">כותרת המאמר הראשון</div>
        <div class="post-excerpt">תקציר קצר של המאמר — שתי שורות שמסבירות על מה מדובר.</div>
      </div>
    </a>
  </div>
</div>

<script src="../../assets/js/toolbar.js"></script>
</body>
</html>
