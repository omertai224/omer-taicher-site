*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Rubik',sans-serif;
  background:#0f1a2e;
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  direction:rtl;
}
.container{
  text-align:center;
  padding:24px 24px;
  max-width:540px;
  width:100%;
  position:relative;
  z-index:1;
}

/* V circle animation */
.success-circle{
  width:90px;height:90px;
  margin:0 auto 24px;
  position:relative;
}
.success-circle svg{
  width:90px;height:90px;
}
.circle-bg{
  fill:none;stroke:#1e5f74;stroke-width:4;
}
.circle-progress{
  fill:none;stroke:#4ade80;stroke-width:4;
  stroke-linecap:round;
  stroke-dasharray:251.327;
  stroke-dashoffset:251.327;
  animation:circle-draw 1s 0.3s ease-out forwards;
  transform:rotate(-90deg);
  transform-origin:center;
}
.check-mark{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  opacity:0;
  animation:check-pop 0.4s 1s ease-out forwards;
}
.check-mark svg{width:52px;height:52px;}

@keyframes circle-draw{
  to{stroke-dashoffset:0}
}
@keyframes check-pop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  60%{transform:translate(-50%,-50%) scale(1.15)}
  100%{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

h1{
  font-size:2rem;font-weight:800;
  color:#fff;margin-bottom:12px;
  animation:fade-up 0.6s 0.5s ease-out both;
}
.subtitle{
  font-size:1.1rem;color:#a8c5d6;
  line-height:1.8;margin-bottom:28px;
  animation:fade-up 0.6s 0.7s ease-out both;
}

.channels{
  display:flex;flex-direction:column;gap:16px;
  margin-bottom:28px;
  animation:fade-up 0.6s 0.9s ease-out both;
}
.channel{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:16px;
  padding:20px 24px;
  display:flex;align-items:center;gap:16px;
  text-align:right;
}
.channel-icon{
  flex:0 0 48px;height:48px;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
}
.channel-icon svg{width:24px;height:24px;}
.channel-text h3{font-size:0.95rem;font-weight:700;margin-bottom:2px;}
.channel-text p{font-size:0.82rem;color:#a8c5d6;line-height:1.5;}

.home-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:#e8854a;color:#fff;
  font-family:'Rubik',sans-serif;font-weight:700;font-size:1rem;
  text-decoration:none;
  padding:14px 36px;border-radius:50px;
  animation:fade-up 0.6s 1.1s ease-out both;
  transition:background 0.2s,transform 0.15s;
  box-shadow:0 4px 20px rgba(232,133,74,0.3);
}
.home-btn:hover{background:#d4743f;transform:translateY(-2px);}

@keyframes fade-up{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}

/* Background glow */
.bg-glow{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 600px 400px at 50% 30%, rgba(30,95,116,0.3) 0%, transparent 70%),
    radial-gradient(ellipse 300px 300px at 30% 70%, rgba(232,133,74,0.08) 0%, transparent 70%);
}
