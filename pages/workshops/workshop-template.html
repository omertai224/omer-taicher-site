<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>שם ההדרכה | עומר טייכר</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/main.css">
<style>
  .hero { background: var(--navy); color: #fff; padding: 80px 0; text-align: center; }

  .badge { display: inline-block; background: var(--orange-deep); color: #fff; padding: 6px 18px; border-radius: 50px; font-size: 0.8rem; font-weight: 700; margin-bottom: 20px; }
  .price-box { background: var(--white); border-radius: var(--radius); padding: 40px; text-align: center; max-width: 400px; margin: 0 auto; }
  .price { font-size: 2.5rem; font-weight: 800; color: var(--navy); }
  .section { padding: 64px 0; }
</style>

    <a href="#register" class="btn btn-primary">לרישום</a>
  </div>
</section>

<section class="section">
  <div class="container">
    <!-- תוכן ההדרכה -->
  </div>
</section>

<section class="section" id="register">
  <div class="container">
    <div class="price-box card">
      <div class="price">₪XXX</div>
      <p style="margin: 12px 0 24px;">כולל חומרים + תמיכה</p>
      <a href="#" class="btn btn-primary" style="width:100%; justify-content:center;">הרשמה עכשיו</a>
    </div>
  </div>
</section>

<script src="../../assets/js/toolbar.js"></script>
</body>
</html>
