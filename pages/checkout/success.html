<style>
  .success-page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: var(--cream);
  }
  .success-card {
    background: #fff;
    border-radius: 24px;
    padding: 48px 32px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 16px 48px rgba(26,74,107,0.12);
    border: 1px solid var(--border);
  }
  .success-icon {
    width: 80px;
    height: 80px;
    background: #f0fdf4;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
    border: 2px solid #bbf7d0;
  }
  .success-title {
    font-size: 1.7rem;
    font-weight: 900;
    color: var(--navy);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .success-sub {
    font-size: 0.95rem;
    color: var(--text-mid);
    line-height: 1.8;
    margin-bottom: 32px;
  }
  .success-product {
    background: var(--navy-light);
    border-radius: 14px;
    padding: 18px 20px;
    margin-bottom: 28px;
    text-align: right;
  }
  .success-product-label {
    font-size: 0.72rem;
    color: var(--text-light);
    font-weight: 600;
    text-transform: uppercase;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .success-product-name {
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
  }
  .success-actions {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .success-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: #25D366;
    color: #fff;
    border-radius: 50px;
    padding: 14px 28px;
    font-weight: 700;
    font-size: 0.95rem;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
  }
  .success-wa:hover {
    background: #1da851;
    transform: translateY(-2px);
  }
  .success-home {
    color: var(--navy);
    font-size: 0.85rem;
    font-weight: 600;
    text-decoration: none;
    opacity: 0.65;
    transition: opacity 0.2s;
    padding: 8px;
    display: inline-block;
  }
  .success-home:hover { opacity: 1; }
</style>
