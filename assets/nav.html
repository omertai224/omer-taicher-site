<style>
:root{--cream:#fdf8f2;--orange-deep:#e8854a;--orange-light:#fdeede;--navy:#1a4a6b;--navy-mid:#1e5f74;--navy-light:#eef4f8;--border:#e8e0d6;--text-mid:#555}
nav{position:fixed;top:0;width:100%;z-index:100;background:rgba(253,248,242,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;box-sizing:border-box}
.logo{font-size:1.1rem;font-weight:800;color:var(--navy);text-decoration:none;font-family:'Rubik',sans-serif}.logo span{color:var(--orange-deep)}
.nav-links{display:none;list-style:none}
.nav-mobile-cta{background:var(--navy-light);color:var(--navy);padding:8px 18px;border-radius:50px;font-weight:600;font-size:0.82rem;text-decoration:none;font-family:'Rubik',sans-serif;display:flex;align-items:center;gap:6px}
.hamburger{display:flex;flex-direction:column;gap:5px;cursor:pointer;padding:6px;border:none;background:transparent;border-radius:8px}.hamburger span{display:block;width:22px;height:2px;background:var(--navy);border-radius:2px;transition:all 0.3s}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}.hamburger.open span:nth-child(2){opacity:0}.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;position:fixed;top:60px;right:0;left:0;background:rgba(253,248,242,0.98);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 20px 24px;z-index:99;flex-direction:column;gap:4px;box-shadow:0 8px 32px rgba(26,74,107,0.1)}
.mobile-menu.open{display:flex}.mobile-menu a{display:block;padding:14px 16px;color:var(--navy);text-decoration:none;font-size:1rem;font-weight:600;border-radius:12px;transition:background 0.2s;font-family:'Rubik',sans-serif}.mobile-menu a:hover{background:var(--navy-light)}
@media(min-width:960px){.hamburger{display:none}.nav-links{display:flex;gap:28px;align-items:center}.nav-links a{color:var(--navy);text-decoration:none;font-size:0.85rem;font-weight:600;padding:7px 14px;border-radius:50px;background:var(--navy-light);transition:background 0.2s,color 0.2s;display:inline-flex;align-items:center;gap:6px;font-family:'Rubik',sans-serif}.nav-mobile-cta{display:none}.mobile-menu{display:none!important}nav{padding:0 60px}}
</style>

<script>
(function(){
  var h=document.getElementById('hamburger'),m=document.getElementById('mobile-menu');
  if(!h||!m)return;
  h.addEventListener('click',function(){h.classList.toggle('open');m.classList.toggle('open');document.body.style.overflow=m.classList.contains('open')?'hidden':'';});
  window.closeMenu=function(){h.classList.remove('open');m.classList.remove('open');document.body.style.overflow='';};
})();
</script>
