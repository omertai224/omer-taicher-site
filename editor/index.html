<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>עורך הדרכות | עומר טייכר</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iI2Y2YTY3ZSIvPjxwYXRoIGQ9Ik0yMCA2bC05IDE0aDZsLTEgNiA5LTE0aC02bDEtNnoiIGZpbGw9IiMxYTFhMmUiLz48L3N2Zz4=">
<link rel="preload" href="/assets/fonts/rubik-hebrew-400-normal.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/rubik-hebrew-700-normal.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face{font-family:'Rubik';font-style:normal;font-display:swap;font-weight:400;src:url(/assets/fonts/rubik-hebrew-400-normal.woff2) format('woff2');unicode-range:U+0590-05FF,U+200C-2010,U+20AA,U+25CC,U+FB1D-FB4F}
@font-face{font-family:'Rubik';font-style:normal;font-display:swap;font-weight:600;src:url(/assets/fonts/rubik-hebrew-700-normal.woff2) format('woff2');unicode-range:U+0590-05FF,U+200C-2010,U+20AA,U+25CC,U+FB1D-FB4F}
@font-face{font-family:'Rubik';font-style:normal;font-display:swap;font-weight:700;src:url(/assets/fonts/rubik-hebrew-700-normal.woff2) format('woff2');unicode-range:U+0590-05FF,U+200C-2010,U+20AA,U+25CC,U+FB1D-FB4F}
@font-face{font-family:'Rubik';font-style:normal;font-display:swap;font-weight:900;src:url(/assets/fonts/rubik-hebrew-800-normal.woff2) format('woff2');unicode-range:U+0590-05FF,U+200C-2010,U+20AA,U+25CC,U+FB1D-FB4F}
@font-face{font-family:'Rubik';font-style:normal;font-display:swap;font-weight:400;src:url(/assets/fonts/rubik-latin-400-normal.woff2) format('woff2');unicode-range:U+0000-00FF}
@font-face{font-family:'Rubik';font-style:normal;font-display:swap;font-weight:700;src:url(/assets/fonts/rubik-latin-700-normal.woff2) format('woff2');unicode-range:U+0000-00FF}
</style>
<link rel="stylesheet" href="/editor/style.css">
</head>
<body>

<!-- TOKEN GATE -->
<div id="editor-token-gate" style="position:fixed;inset:0;background:#0f1a2e;z-index:9999;display:flex;align-items:center;justify-content:center;font-family:'Rubik',sans-serif;">
  <div style="text-align:center;max-width:360px;padding:40px;">
    <div style="font-size:18px;font-weight:700;color:#f6a67e;margin-bottom:8px;">עורך הדרכות</div>
    <div style="font-size:13px;color:#ffffff88;margin-bottom:24px;">עומר טייכר</div>
    <div style="margin-bottom:16px;">
      <input id="editor-token-input" type="password" placeholder="GitHub Token" dir="ltr"
        style="width:100%;padding:12px 16px;border-radius:10px;background:#1a2540;border:1px solid #ffffff22;color:white;font-family:'Rubik',sans-serif;font-size:14px;outline:none;text-align:center;"
        onkeydown="if(event.key==='Enter')editorSaveToken()">
    </div>
    <button id="editor-token-btn" onclick="editorSaveToken()"
      style="width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#e8834e,#f6a67e);border:none;color:#1a1a2e;font-family:'Rubik',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">
      כניסה
    </button>
  </div>
</div>

<!-- Top Bar -->
<div class="topbar">
  <!-- Right: Save + Status -->
  <button class="tb-icon save-disk" id="btnSave" title="שמור (Ctrl+S)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
  </button>
  <span class="save-status" id="statusText"></span>
  <div class="topbar-spacer"></div>
  <!-- Center: Controls -->
  <button class="tb-icon" id="btnZoomFit" title="התאם גודל">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
  </button>
  <button class="tb-icon" id="btnZoomOut" title="הקטן">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <button class="tb-icon" id="btnZoomIn" title="הגדל">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
  </button>
  <div class="topbar-sep"></div>
  <button class="tb-icon nav-arrow" id="btnNext" title="שקף הבא">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="10 8 14 12 10 16"/></svg>
  </button>
  <span class="slide-info" id="slideInfo">---</span>
  <button class="tb-icon nav-arrow" id="btnPrev" title="שקף קודם">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="14 16 10 12 14 8"/></svg>
  </button>
  <div class="topbar-sep"></div>
  <select id="tutorialSelect"><option value="">בחרו הדרכה...</option></select>
  <div class="topbar-spacer"></div>
</div>

<!-- Main -->
<div class="main">
  <div class="canvas-area" id="canvasArea">
    <div class="no-slide" id="noSlide">
      <div class="welcome-screen">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f6a67e" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </div>
        <div class="welcome-title">עורך הדרכות אינטראקטיביות</div>
        <div class="welcome-sub">בחרו הדרכה מהתפריט למעלה</div>
      </div>
    </div>
    <div class="canvas-inner" id="canvasInner">
    <div class="slide-container" id="slideContainer" style="display:none;">
      <img class="slide-img" id="slideImg">
      <div class="editor-box" id="editorBox" style="display:none;">
        <div class="resize-handle tl" data-handle="tl"></div>
        <div class="resize-handle tr" data-handle="tr"></div>
        <div class="resize-handle bl" data-handle="bl"></div>
        <div class="resize-handle br" data-handle="br"></div>
      </div>
      <div class="editor-bubble" id="editorBubble" style="display:none;">
        <div class="drag-label">&#x2725; גררו למיקום</div>
        <div id="bubblePreview"></div>
        <div class="resize-handle br bubble-resize" data-handle="br"></div>
      </div>
    </div>
    </div>
    <!-- Drop zone overlay -->
    <div class="drop-overlay" id="dropOverlay" style="display:none;">
      <div class="drop-content">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#f6a67e" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div>שחררו תמונות כאן</div>
      </div>
    </div>
  </div>
  <div class="panel" id="panel"></div>
</div>

<!-- Slide Strip -->
<div class="strip-wrap">
  <button class="strip-nav" id="stripPrev" onclick="goPrev()" title="שקף קודם">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="14 16 10 12 14 8"/></svg>
  </button>
  <div class="strip" id="slideStrip"></div>
  <button class="strip-nav" id="stripNext" onclick="goNext()" title="שקף הבא">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="10 8 14 12 10 16"/></svg>
  </button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Scripts -->
<script src="/editor/app.js"></script>
<script src="/editor/loader.js"></script>
<script src="/editor/nav.js"></script>
<script src="/editor/render.js"></script>
<script src="/editor/drag-box.js"></script>
<script src="/editor/drag-bubble.js"></script>
<script src="/editor/panel.js"></script>
<script src="/editor/notes.js"></script>
<script src="/editor/speech.js"></script>
<script src="/editor/slide-mgmt.js"></script>
<script src="/editor/export.js"></script>
<script src="/editor/github.js"></script>
</body>
</html>
